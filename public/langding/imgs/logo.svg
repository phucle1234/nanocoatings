<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <linearGradient id="chromeText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#dedede"/>
      <stop offset="45%" stop-color="#b0b0b0"/>
      <stop offset="50%" stop-color="#555555"/>
      <stop offset="55%" stop-color="#e8e8e8"/>
      <stop offset="85%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a3a3a3"/>
    </linearGradient>

    <linearGradient id="chromeStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#737373"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>

    <linearGradient id="reflectionFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <g id="textGroup">
      <text x="290" y="115" font-family="Arial Black, Impact, sans-serif" font-size="78" font-weight="900" letter-spacing="-2" text-anchor="middle">Nano-Clear</text>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGlow)"/>

  <use href="#textGroup" fill="url(#chromeText)" transform="scale(1, -0.6) translate(0, -228)" opacity="0.7"/>
  <rect x="0" y="116" width="600" height="84" fill="url(#reflectionFade)" style="mix-blend-mode: multiply;"/>

  <use href="#textGroup" fill="url(#chromeText)" stroke="url(#chromeStroke)" stroke-width="2.5" stroke-linejoin="round"/>

  <g transform="translate(535, 30)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="url(#chromeText)" stroke-width="1.5"/>
    <text x="0" y="3.5" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="url(#chromeText)" text-anchor="middle">R</text>
  </g>
</svg>
