version: '3.8'

services:
  app:
    build: .
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - /Applications/MAMP/htdocs/casumina:/var/www
    networks:
      - laravel
    depends_on:
      - db
      - redis
      - elasticsearch

  web:
    image: nginx:stable
    container_name: laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - /Applications/MAMP/htdocs/casumina:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mariadb:11
    container_name: laravel_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: casumina
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravelpassword
    command: --default-authentication-plugin=mysql_native_password --skip-host-cache --skip-name-resolve
    ports:
      - "3307:3306"
    networks:
      - laravel
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    environment:
      PMA_HOST: db          # tên service MySQL/MariaDB
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    ports:
      - "8081:80"           # truy cập từ host trên localhost:8081
    depends_on:
      - db
    networks:
      - laravel
  

  redis:
    image: redis:7.0
    container_name: laravel_redis
    ports:
      - "6379:6379"
    networks:
      - laravel

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: laravel_es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 1g
    ports:
      - "9200:9200"
    networks:
      - laravel

networks:
  laravel:
    driver: bridge
